<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment 9 - Form Validation</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;margin:0;padding:24px}
    .box{max-width:460px;margin:30px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    input{width:100%;padding:10px;margin:8px 0 14px;border:1px solid #cbd5e1;border-radius:8px}
    button{width:100%;padding:11px;background:#2563eb;color:#fff;border:0;border-radius:8px;cursor:pointer}
    .msg{margin-top:12px;font-weight:600}
    .ok{color:#15803d}.err{color:#b91c1c}
  </style>
</head>
<body>
  <section class="box">
    <h1>Experiment 9: Registration Validation</h1>
    <form id="regForm">
      <label>Name</label>
      <input id="name" type="text" placeholder="Enter name" />
      <label>Email</label>
      <input id="email" type="email" placeholder="Enter email" />
      <label>Password</label>
      <input id="password" type="password" placeholder="Min 6 characters" />
      <button type="submit">Submit</button>
    </form>
    <p id="msg" class="msg"></p>
  </section>

  <script>
    const form = document.getElementById('regForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      if (!name || !emailOk || password.length < 6) {
        msg.textContent = 'Please enter valid name, email, and password (min 6 chars).';
        msg.className = 'msg err';
        return;
      }
      msg.textContent = 'Form submitted successfully.';
      msg.className = 'msg ok';
    });
  </script>
</body>
</html>
